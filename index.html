<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anki Pronunciation</title>

<link rel="manifest" href="/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body {
  margin: 0;
  padding: 12px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
#word {
  text-align: center;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 12px;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  border-radius: 8px;
  border: none;
  background: #1976ff;
  color: #fff;
}
button:active {
  background: #1258c7;
}
#status {
  text-align: center;
  font-size: 12px;
  color: #666;
  margin-top: 8px;
}
audio {
  width: 100%;
  margin-top: 8px;
}
#scores {
  margin-top: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="word"></div>

<button id="recordBtn">🎤 开始录音</button>

<div id="status">准备就绪</div>

<audio id="player" controls></audio>

<div id="scores"></div>

<script>
/* 注册 Service Worker（PWA） */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}

/* 获取 Anki 传入的单词 */
const params = new URLSearchParams(location.search);
const word = params.get("word") || "example";
document.getElementById("word").innerText = word;

const recordBtn = document.getElementById("recordBtn");
const status = document.getElementById("status");
const player = document.getElementById("player");
const scores = document.getElementById("scores");

let mediaRecorder;
let chunks = [];
let recording = false;

recordBtn.onclick = async () => {
  if (!recording) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);

    mediaRecorder.onstop = async () => {
      const blob = new Blob(chunks, { type: "audio/webm" });
      player.src = URL.createObjectURL(blob);
      await sendToAssess(blob);
    };

    mediaRecorder.start();
    recording = true;
    recordBtn.innerText = "⏹ 停止录音";
    status.innerText = "录音中…";
  } else {
    mediaRecorder.stop();
    recording = false;
    recordBtn.innerText = "🎤 开始录音";
  }
};

/* ====== 发送到后端测评 ====== */
async function sendToAssess(audioBlob) {
  status.innerText = "测评中…";
  scores.innerHTML = "";

  try {
    const res = await fetch(
      "https://anki-pronunciation.onrender.com/assess?text=" +
        encodeURIComponent(word),
      {
        method: "POST",
        body: audioBlob
      }
    );

    const data = await res.json();

    const pa = data?.NBest?.[0]?.PronunciationAssessment;
    if (!pa) {
      status.innerText = "测评失败";
      return;
    }

    const acc = Math.round(pa.AccuracyScore);
    const flu = Math.round(pa.FluencyScore);
    const comp = Math.round(pa.CompletenessScore);
    const total = Math.round((acc + flu + comp) / 3);

    status.innerText = "测评完成";
    scores.innerHTML = `
      <strong>总分：${total}</strong><br>
      Accuracy：${acc}<br>
      Fluency：${flu}<br>
      Completeness：${comp}
    `;
  } catch (e) {
    status.innerText = "测评失败";
  }
}
</script>

</body>
</html>
