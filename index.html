<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anki 发音测评</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: transparent;
}

.card {
  padding: 10px;
}

#word {
  text-align: center;
  font-size: 28px;
  font-weight: 600;
}

#ipa {
  text-align: center;
  font-size: 16px;
  color: #666;
  margin-bottom: 8px;
}

#total {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin: 6px 0;
}

#metrics {
  display: flex;
  justify-content: space-around;
  font-size: 13px;
  margin-bottom: 6px;
}

#phonemes {
  text-align: center;
  margin-top: 6px;
}

.ph {
  display: inline-block;
  padding: 4px 6px;
  margin: 2px;
  border-radius: 6px;
  font-size: 14px;
  background: #eee;
}

.bad { background: #ffcccc; }
.mid { background: #ffe0a3; }
.good { background: #c8f5c8; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #1976ff;
  color: white;
}

audio {
  width: 100%;
  margin-top: 6px;
}
</style>
</head>

<body>
<div class="card">

  <div id="word"></div>
  <div id="ipa"></div>

  <div id="total">—</div>
  <div id="metrics">
    <div id="acc">准确度 —</div>
    <div id="flu">流利度 —</div>
    <div id="com">完整度 —</div>
  </div>

  <div id="phonemes"></div>

  <button id="btn">🎤 开始录音</button>
  <audio id="player" controls></audio>

</div>

<script>
const params = new URLSearchParams(location.search);
const word = params.get("word") || "example";
const ipa = params.get("ipa") || "";

wordEl.innerText = word;
ipaEl.innerText = ipa;

let recording = false;
let audioContext, processor, input, stream;
let chunks = [];

btn.onclick = async () => {
  if (!recording) {
    start();
    btn.innerText = "⏹ 停止录音";
  } else {
    stop();
    btn.innerText = "🎤 开始录音";
  }
  recording = !recording;
};

async function start() {
  chunks = [];
  audioContext = new AudioContext({ sampleRate: 16000 });
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  input = audioContext.createMediaStreamSource(stream);
  processor = audioContext.createScriptProcessor(4096, 1, 1);
  processor.onaudioprocess = e => {
    chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };
  input.connect(processor);
  processor.connect(audioContext.destination);
}

function stop() {
  processor.disconnect();
  input.disconnect();
  stream.getTracks().forEach(t => t.stop());

  const wav = encodeWAV(chunks, audioContext.sampleRate);
  player.src = URL.createObjectURL(wav);
  send(wav);
}

function encodeWAV(buffers, sr) {
  let len = buffers.reduce((s,b)=>s+b.length,0);
  let pcm = new Int16Array(len);
  let o=0;
  buffers.forEach(b=>{
    for(let i=0;i<b.length;i++) pcm[o++] = b[i]*0x7fff;
  });

  let buf = new ArrayBuffer(44 + pcm.length*2);
  let v = new DataView(buf);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  w(0,"RIFF"); v.setUint32(4,36+pcm.length*2,true);
  w(8,"WAVE"); w(12,"fmt "); v.setUint32(16,16,true);
  v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,"data"); v.setUint32(40,pcm.length*2,true);
  let p=44; pcm.forEach(x=>{v.setInt16(p,x,true);p+=2});
  return new Blob([v],{type:"audio/wav"});
}

async function send(blob) {
  const r = await fetch(
    "https://anki-pronunciation.onrender.com/assess?text=" +
    encodeURIComponent(word),
    { method:"POST", body: blob }
  );
  const d = await r.json();
  const pa = d.NBest?.[0]?.PronunciationAssessment;
  if (!pa) return;

  acc.innerText = "准确度 " + Math.round(pa.AccuracyScore);
  flu.innerText = "流利度 " + Math.round(pa.FluencyScore);
  com.innerText = "完整度 " + Math.round(pa.CompletenessScore);
  total.innerText = "总分 " + Math.round(
    (pa.AccuracyScore + pa.FluencyScore + pa.CompletenessScore)/3
  );

  phonemes.innerHTML = "";
  d.NBest[0].Words.forEach(w=>{
    w.Phonemes?.forEach(p=>{
      const s = p.AccuracyScore;
      const span = document.createElement("span");
      span.className = "ph " + (s<60?"bad":s<80?"mid":"good");
      span.innerText = p.Phoneme;
      span.title = `准确度 ${Math.round(s)}`;
      phonemes.appendChild(span);
    });
  });
}
</script>
</body>
</html>
