<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anki Pronunciation</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.card {
  padding: 8px;
}
#word {
  text-align: center;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 6px;
}
button {
  width: 100%;
  padding: 10px;
  font-size: 15px;
  border-radius: 8px;
  border: none;
  background: #1976ff;
  color: #fff;
}
button.recording {
  background: #e53935;
}
#status {
  text-align: center;
  font-size: 12px;
  color: #666;
  margin: 4px 0;
}
audio {
  width: 100%;
  margin-top: 6px;
  accent-color: #1976ff;
}
#scores {
  margin-top: 6px;
  font-size: 13px;
  line-height: 1.5;
}
</style>
</head>

<body>
<div class="card">

  <div id="word">Loading…</div>

  <button id="recordBtn">🎤 开始录音</button>

  <div id="status">准备就绪</div>

  <audio id="player" controls></audio>

  <div id="scores"></div>

</div>

<script>
/* ===== 单词（Anki 通过 URL 传入） ===== */
const params = new URLSearchParams(location.search);
const word = params.get("word") || "example";
document.getElementById("word").innerText = word;

/* ===== 状态 ===== */
let recorder;
let chunks = [];
let recording = false;

const btn = document.getElementById("recordBtn");
const status = document.getElementById("status");
const player = document.getElementById("player");
const scoresDiv = document.getElementById("scores");

/* ===== 点击开始 / 停止 ===== */
btn.onclick = async () => {
  if (!recording) {
    await startRecording();
  } else {
    stopRecording();
  }
};

/* ===== 开始录音 ===== */
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const mimeType =
      MediaRecorder.isTypeSupported("audio/webm")
        ? "audio/webm"
        : "audio/mp4";

    recorder = new MediaRecorder(stream, { mimeType });
    chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = async () => {
      const blob = new Blob(chunks, { type: recorder.mimeType });
      player.src = URL.createObjectURL(blob);
      player.onloadedmetadata = () => {
        player.currentTime = 0;
      };
      await sendToAzure(blob);
    };

    recorder.start();
    recording = true;
    btn.classList.add("recording");
    btn.innerText = "⏹ 停止录音";
    status.innerText = "录音中…";
    scoresDiv.innerHTML = "";

  } catch (e) {
    status.innerText = "无法访问麦克风";
  }
}

/* ===== 停止录音 ===== */
function stopRecording() {
  if (!recorder) return;
  recorder.stop();
  recorder.stream.getTracks().forEach(t => t.stop());
  recording = false;
  btn.classList.remove("recording");
  btn.innerText = "🎤 开始录音";
  status.innerText = "处理中…";
}

/* ===== 发送到 Azure ===== */
async function sendToAzure(audioBlob) {
  status.innerText = "测评中…";

  try {
    const res = await fetch(
      "/assess?text=" + encodeURIComponent(word),
      {
        method: "POST",
        body: audioBlob
      }
    );

    const data = await res.json();
    const pa = data?.NBest?.[0]?.PronunciationAssessment;
    if (!pa) throw "no score";

    const acc = pa.AccuracyScore ?? 0;
    const flu = pa.FluencyScore ?? 0;
    const comp = pa.CompletenessScore ?? 0;
    const total = Math.round((acc + flu + comp) / 3);

    status.innerText = "测评完成";
    scoresDiv.innerHTML = `
      总分：${total}<br>
      Accuracy：${Math.round(acc)}<br>
      Fluency：${Math.round(flu)}<br>
      Completeness：${Math.round(comp)}
    `;

  } catch (e) {
    status.innerText = "测评失败";
  }
}
</script>
</body>
</html>
