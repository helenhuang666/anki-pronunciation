<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pronunciation Test</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  padding: 12px;
}
#word {
  text-align: center;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 10px;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #1976ff;
  color: #fff;
}
button.recording {
  background: #e53935;
}
#status {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin: 8px 0;
}
audio {
  width: 100%;
  margin-top: 8px;
}
#scores {
  margin-top: 10px;
  font-size: 14px;
  line-height: 1.5;
}
</style>
</head>

<body>

<div id="word">example</div>

<button id="btn">🎤 开始录音</button>

<div id="status">准备就绪</div>

<audio id="player" controls></audio>

<div id="scores"></div>

<script>
/* ========= 单词 ========= */
const params = new URLSearchParams(location.search);
const word = params.get("word") || "example";
document.getElementById("word").innerText = word;

/* ========= 录音 ========= */
let audioContext;
let mediaStream;
let processor;
let data = [];
let recording = false;

const btn = document.getElementById("btn");
const status = document.getElementById("status");
const player = document.getElementById("player");
const scores = document.getElementById("scores");

btn.onclick = async () => {
  if (!recording) start();
  else stop();
};

async function start() {
  data = [];
  audioContext = new AudioContext({ sampleRate: 16000 });
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const source = audioContext.createMediaStreamSource(mediaStream);
  processor = audioContext.createScriptProcessor(4096, 1, 1);

  processor.onaudioprocess = e => {
    data.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };

  source.connect(processor);
  processor.connect(audioContext.destination);

  recording = true;
  btn.classList.add("recording");
  btn.innerText = "⏹ 停止录音";
  status.innerText = "录音中…";
  scores.innerHTML = "";
}

function stop() {
  processor.disconnect();
  mediaStream.getTracks().forEach(t => t.stop());
  audioContext.close();

  const wav = encodeWAV(data, 16000);
  player.src = URL.createObjectURL(wav);

  recording = false;
  btn.classList.remove("recording");
  btn.innerText = "🎤 开始录音";

  send(wav);
}

/* ========= WAV 编码 ========= */
function encodeWAV(buffers, sampleRate) {
  let length = buffers.reduce((s, b) => s + b.length, 0);
  let pcm = new Int16Array(length);
  let offset = 0;

  buffers.forEach(b => {
    for (let i = 0; i < b.length; i++, offset++) {
      pcm[offset] = Math.max(-1, Math.min(1, b[i])) * 0x7fff;
    }
  });

  const buffer = new ArrayBuffer(44 + pcm.length * 2);
  const view = new DataView(buffer);

  function write(o, s) {
    for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i));
  }

  write(0, "RIFF");
  view.setUint32(4, 36 + pcm.length * 2, true);
  write(8, "WAVE");
  write(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  write(36, "data");
  view.setUint32(40, pcm.length * 2, true);

  let p = 44;
  pcm.forEach(v => {
    view.setInt16(p, v, true);
    p += 2;
  });

  return new Blob([view], { type: "audio/wav" });
}

/* ========= 发送测评 ========= */
async function send(wav) {
  status.innerText = "测评中…";

  try {
    const res = await fetch(
      "/assess?text=" + encodeURIComponent(word),
      { method: "POST", body: wav }
    );

    const json = await res.json();
    const pa = json?.NBest?.[0]?.PronunciationAssessment;
    if (!pa) throw 1;

    status.innerText = "测评完成";
    scores.innerHTML = `
      Accuracy: ${Math.round(pa.AccuracyScore)}<br>
      Fluency: ${Math.round(pa.FluencyScore)}<br>
      Completeness: ${Math.round(pa.CompletenessScore)}
    `;
  } catch {
    status.innerText = "测评失败";
  }
}
</script>

</body>
</html>
