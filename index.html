<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>发音测评</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  margin: 0;
  padding: 12px;
}

#word {
  text-align: center;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 6px;
}

#phonemes {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  margin: 10px 0;
}

.ph {
  padding: 6px 8px;
  border-radius: 6px;
  font-size: 15px;
  cursor: pointer;
  user-select: none;
}

.good { background: #e8f5e9; color: #2e7d32; }
.mid  { background: #fff8e1; color: #f57f17; }
.bad  { background: #fdecea; color: #c62828; }

button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #1976ff;
  color: #fff;
}

button.recording {
  background: #e53935;
}

#status {
  text-align: center;
  font-size: 13px;
  color: #666;
  margin: 8px 0;
}

audio {
  width: 100%;
  margin-top: 6px;
}

#scores {
  margin-top: 8px;
  font-size: 14px;
  text-align: center;
  line-height: 1.6;
}
</style>
</head>

<body>

<div id="word"></div>

<div id="phonemes"></div>

<button id="btn">🎤 开始录音</button>

<div id="status">准备就绪</div>

<audio id="player" controls></audio>

<div id="scores"></div>

<script>
/* ========= 读取单词（Anki → 网页） ========= */
const params = new URLSearchParams(location.search);
const word = params.get("word") || "—";
document.getElementById("word").innerText = word;

/* ========= 录音 ========= */
let audioContext, stream, processor;
let buffers = [];
let recording = false;

const btn = document.getElementById("btn");
const status = document.getElementById("status");
const player = document.getElementById("player");
const scores = document.getElementById("scores");
const phonemesDiv = document.getElementById("phonemes");

btn.onclick = async () => {
  if (!recording) start();
  else stop();
};

async function start() {
  buffers = [];
  audioContext = new AudioContext({ sampleRate: 16000 });
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const source = audioContext.createMediaStreamSource(stream);
  processor = audioContext.createScriptProcessor(4096, 1, 1);
  processor.onaudioprocess = e => {
    buffers.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };
  source.connect(processor);
  processor.connect(audioContext.destination);

  recording = true;
  btn.classList.add("recording");
  btn.innerText = "⏹ 停止录音";
  status.innerText = "录音中…";
  scores.innerHTML = "";
  phonemesDiv.innerHTML = "";
}

function stop() {
  processor.disconnect();
  stream.getTracks().forEach(t => t.stop());
  audioContext.close();

  const wav = encodeWAV(buffers, 16000);
  player.src = URL.createObjectURL(wav);

  recording = false;
  btn.classList.remove("recording");
  btn.innerText = "🎤 开始录音";

  send(wav);
}

/* ========= WAV ========= */
function encodeWAV(buffers, sampleRate) {
  let len = buffers.reduce((s,b)=>s+b.length,0);
  let pcm = new Int16Array(len);
  let off = 0;
  buffers.forEach(b=>{
    for(let i=0;i<b.length;i++,off++){
      pcm[off] = Math.max(-1,Math.min(1,b[i])) * 0x7fff;
    }
  });
  const buf = new ArrayBuffer(44 + pcm.length*2);
  const v = new DataView(buf);
  const w = (o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  w(0,"RIFF"); v.setUint32(4,36+pcm.length*2,true);
  w(8,"WAVE"); w(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,1,true); v.setUint32(24,sampleRate,true);
  v.setUint32(28,sampleRate*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  w(36,"data"); v.setUint32(40,pcm.length*2,true);
  let p=44; pcm.forEach(x=>{v.setInt16(p,x,true);p+=2;});
  return new Blob([v],{type:"audio/wav"});
}

/* ========= 发送测评 ========= */
async function send(wav){
  status.innerText = "测评中…";
  try{
    const res = await fetch(
      "/assess?text=" + encodeURIComponent(word),
      { method:"POST", body:wav }
    );
    const json = await res.json();
    const best = json.NBest[0];
    const pa = best.PronunciationAssessment;

    status.innerText = "测评完成";
    scores.innerHTML = `
      总分：${Math.round(pa.PronScore)}<br>
      准确度：${Math.round(pa.AccuracyScore)}　
      流利度：${Math.round(pa.FluencyScore)}　
      完整度：${Math.round(pa.CompletenessScore)}
    `;

    renderPhonemes(best.Words[0].Phonemes);
  }catch{
    status.innerText = "测评失败";
  }
}

/* ========= 音素 UI ========= */
function renderPhonemes(list){
  phonemesDiv.innerHTML = "";
  list.forEach(p=>{
    const s = p.PronunciationAssessment.AccuracyScore;
    const span = document.createElement("span");
    span.className = "ph " + (s>=85?"good":s>=60?"mid":"bad");
    span.innerText = p.Phoneme;
    span.onclick = ()=>alert(getTip(p.Phoneme));
    phonemesDiv.appendChild(span);
  });
}

function getTip(p){
  const map = {
    "t":"舌尖轻触上齿龈，快速送气",
    "eh":"嘴微张，短促元音 /e/",
    "s":"气流从齿缝摩擦",
    "æ":"嘴张大，舌位低"
  };
  return map[p] || "注意该音的标准发音位置";
}
</script>

</body>
</html>
