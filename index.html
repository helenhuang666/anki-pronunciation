<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anki Pronunciation</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  padding:12px;
}
#word{
  text-align:center;
  font-size:26px;
  font-weight:600;
}
#ipa{
  text-align:center;
  font-size:16px;
  color:#666;
  margin-top:4px;
}
button{
  width:100%;
  padding:12px;
  margin-top:14px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#1976ff;
  color:#fff;
}
button.recording{background:#e53935}
#status{
  text-align:center;
  font-size:13px;
  color:#666;
  margin-top:8px;
}
#scores{
  margin-top:10px;
  font-size:14px;
  line-height:1.6;
}
audio{width:100%;margin-top:8px}
</style>
</head>

<body>

<div id="word">—</div>
<div id="ipa">/—/</div>

<button id="btn">🎤 开始录音</button>
<div id="status">准备就绪</div>

<audio id="player" controls></audio>
<div id="scores"></div>

<script>
/* ========= 取词（极稳版） ========= */
const params = new URLSearchParams(location.search);
let word = params.get("word");

if (!word || word.trim() === "") {
  word = "example";   // 强兜底，防止 Anki 空字段
}

document.getElementById("word").innerText = word;
document.getElementById("ipa").innerText = "/"+word+"/"; // 占位，不影响评测

/* ========= 录音 ========= */
let audioContext, stream, processor;
let buffers = [];
let recording = false;

const btn = document.getElementById("btn");
const status = document.getElementById("status");
const player = document.getElementById("player");
const scores = document.getElementById("scores");

btn.onclick = async () => {
  if (!recording) startRecording();
  else stopRecording();
};

async function startRecording(){
  buffers = [];
  audioContext = new AudioContext({ sampleRate: 16000 });
  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const source = audioContext.createMediaStreamSource(stream);
  processor = audioContext.createScriptProcessor(4096,1,1);
  processor.onaudioprocess = e=>{
    buffers.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  };

  source.connect(processor);
  processor.connect(audioContext.destination);

  recording = true;
  btn.classList.add("recording");
  btn.innerText = "⏹ 停止录音";
  status.innerText = "录音中…";
  scores.innerHTML = "";
}

function stopRecording(){
  processor.disconnect();
  stream.getTracks().forEach(t=>t.stop());
  audioContext.close();

  const wav = encodeWAV(buffers,16000);
  player.src = URL.createObjectURL(wav);

  recording = false;
  btn.classList.remove("recording");
  btn.innerText = "🎤 开始录音";

  sendForAssess(wav);
}

/* ========= WAV ========= */
function encodeWAV(buffers,sampleRate){
  let len=buffers.reduce((s,b)=>s+b.length,0);
  let pcm=new Int16Array(len),o=0;
  buffers.forEach(b=>{
    for(let i=0;i<b.length;i++,o++){
      pcm[o]=Math.max(-1,Math.min(1,b[i]))*0x7fff;
    }
  });
  const ab=new ArrayBuffer(44+pcm.length*2);
  const v=new DataView(ab);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))};
  w(0,"RIFF");v.setUint32(4,36+pcm.length*2,true);
  w(8,"WAVE");w(12,"fmt ");
  v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,1,true);v.setUint32(24,sampleRate,true);
  v.setUint32(28,sampleRate*2,true);
  v.setUint16(32,2,true);v.setUint16(34,16,true);
  w(36,"data");v.setUint32(40,pcm.length*2,true);
  let p=44;pcm.forEach(x=>{v.setInt16(p,x,true);p+=2});
  return new Blob([v],{type:"audio/wav"});
}

/* ========= 测评 ========= */
async function sendForAssess(wav){
  status.innerText="测评中…";
  try{
    const res = await fetch(
      "/assess?text="+encodeURIComponent(word),
      { method:"POST", body:wav }
    );
    const json = await res.json();
    const pa = json?.NBest?.[0]?.PronunciationAssessment;
    if(!pa) throw 1;

    status.innerText="测评完成";
    scores.innerHTML=`
      总分：${Math.round(pa.PronScore)}<br>
      Accuracy：${Math.round(pa.AccuracyScore)}<br>
      Fluency：${Math.round(pa.FluencyScore)}<br>
      Completeness：${Math.round(pa.CompletenessScore)}
    `;
  }catch(e){
    status.innerText="测评失败";
  }
}
</script>

</body>
</html>
