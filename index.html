<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pronunciation Assessment</title>
  <style>
    /* ===== Global & Layout ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fff;
      height: 100vh;
      /* Fallback */
      height: 100dvh;
      /* Dynamic Viewport Height for Mobile */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      /* Scale global UI by 80% */
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
      /* Allow scrolling if content is tall */
    }

    /* ... omitted styles ... */

    /* ===== Buttons ===== */
    .playback-btn {
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #607d8b;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s;
    }

    .playback-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .playback-btn:active {
      opacity: 0.7;
    }

    /* ===== Target Word & IPA ===== */
    #target-word {
      font-size: 32px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      text-align: center;
      margin-top: 20px;
    }

    #target-ipa {
      font-size: 18px;
      color: #888;
      font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
      margin-bottom: 20px;
      min-height: 24px;
    }

    /* ===== Total Score & Stars ===== */
    .score-header {
      text-align: center;
      margin-bottom: auto;
      transition: opacity 0.3s;
    }

    .total-score {
      font-size: 64px;
      font-weight: 500;
      color: #0288d1;
      /* 加深后的蓝色 (Deep Light Blue) */
      line-height: 1;
    }

    .score-unit {
      font-size: 24px;
      margin-left: 4px;
    }

    .stars {
      font-size: 28px;
      color: #0288d1;
      /* 加深后的蓝色 */
      margin-top: 10px;
      letter-spacing: 4px;
    }

    .stars .gray {
      color: #e0e0e0;
    }

    /* ===== Phoneme Bars ===== */
    .bars-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      /* Slightly tighter gap */
      margin-bottom: 20px;
      flex-wrap: wrap;
      width: 100%;
    }

    .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 35px;
      /* Narrower by 30% (was 50px) */
      background-color: #e1f5fe;
      /* Very light blue background */
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      border-bottom-left-radius: 4px;
      border-bottom-right-radius: 4px;
      padding-top: 16px;
      position: relative;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .bar-group:active {
      transform: scale(0.95);
    }

    .bar-letter {
      font-size: 18px;
      color: #0277bd;
      /* Darker Blue text for letters */
      margin-bottom: 4px;
      font-weight: 500;
    }

    .bar-ipa {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
      font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
    }

    .bar-score {
      width: 100%;
      text-align: center;
      color: white;
      padding: 6px 0;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      margin-top: auto;
      /* Push to bottom */
    }

    /* Colors based on score (Semantics kept red/yellow/green for clarity) */
    .bg-good {
      background-color: #81c784;
    }

    /* Green */
    .bg-fair {
      background-color: #ffb74d;
    }

    /* Orange */
    .bg-poor {
      background-color: #e57373;
    }

    /* Red */

    /* ===== Bottom Controls ===== */
    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: white;
      padding-bottom: max(30px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .mic-button {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: #0288d1;
      /* 加深后的蓝色 */
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(2, 136, 209, 0.4);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-button svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .mic-button.recording {
      background-color: #ff5252;
      /* Red when recording */
      box-shadow: 0 0 0 6px rgba(255, 82, 82, 0.3);
      animation: pulse 1.5s infinite;
    }

    .status-text {
      margin-top: 12px;
      color: #333;
      font-size: 15px;
      font-weight: 500;
      min-height: 20px;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }
    }

    /* Debug Console */
    #debug-console {
      margin: 10px;
      padding: 10px;
      background: #333;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      border-radius: 6px;
      max-height: 120px;
      overflow-y: auto;
      display: block;
      /* 暂时开启以便诊断 */
      text-align: left;
      line-height: 1.4;
      border: 1px solid #555;
    }

    .debug-line {
      margin-bottom: 2px;
    }

    .debug-err {
      color: #ff5252;
    }

    .debug-ok {
      color: #4caf50;
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- Header Word & IPA -->
    <div id="target-word">Apple</div>
    <div id="target-ipa"></div>

    <!-- Score Header -->
    <div class="score-header" id="score-header" style="opacity: 0;">
      <div class="total-score" id="main-score">0<span class="score-unit">分</span></div>
      <div class="stars" id="stars">★★★★★</div>
    </div>

    <div id="tip-box"></div>

    <!-- Bars Area -->
    <div class="bars-container" id="bars-container">
      <div style="color:#666; font-size: 16px; margin: 20px; text-align: center; line-height: 1.6;">
        <div style="font-weight: 600; color: #0288d1; margin-bottom: 8px;">测评模式已就绪</div>
        点击下方蓝色麦克风开始录音<br>
        建议测试单词：<b>Apple</b>
      </div>
    </div>

    <!-- Debug Output -->
    <div id="debug-console">
      <div class="debug-line">[SYS] 等待启动...</div>
    </div>

  </div>

  <!-- Bottom Controls -->
  <div class="controls">
    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <button id="testAzureBtn" class="playback-btn" style="background:#009688;">测试云端连接</button>
      <button id="playbackBtn" class="playback-btn" disabled>回放</button>
    </div>
    <button id="recordBtn" class="mic-button">
      <!-- Mic Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
        <path
          d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
      </svg>
    </button>
    <div class="status-text" id="status">点击录音</div>
  </div>

  <script type="module">
    // ===== Debug Logger (Must be TOP) =====
    const debugConsole = document.getElementById("debug-console");
    function logDebug(msg, type = "") {
      const line = document.createElement("div");
      line.className = "debug-line" + (type ? " debug-" + type : "");
      line.innerText = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
      if (debugConsole) {
        debugConsole.appendChild(line);
        debugConsole.scrollTop = debugConsole.scrollHeight;
      }
      console.log("[DEBUG]", msg);
    }

    logDebug("脚本初始化中...");

    let PhonemeTips = {};
    try {
      const module = await import("./phoneme_tips.js");
      PhonemeTips = module.PhonemeTips || {};
      logDebug("音标提示插件加载成功", "ok");
    } catch (e) {
      logDebug("音标提示插件加载失败，将使用精简模式", "err");
    }

    const params = new URLSearchParams(window.location.search);
    const targetWord = decodeURIComponent(params.get("word") || "Apple");
    const userIpa = decodeURIComponent(params.get("ipa") || "");

    // 立即显示单词
    const wordEl = document.getElementById("target-word");
    const ipaEl = document.getElementById("target-ipa");
    if (wordEl) wordEl.innerText = targetWord;
    if (ipaEl) ipaEl.innerText = userIpa ? `/${userIpa.replace(/^\/|\/$/g, '')}/` : "";

    // ===== 音标工具：Arpabet 强制转标准 IPA =====
    const ARPABET_TO_IPA = {
      "ae": "æ", "ax": "ə", "ah": "ʌ", "aa": "ɑ", "ao": "ɔ", "ih": "ɪ", "eh": "e", "iy": "i", "uh": "ʊ", "uw": "u",
      "er": "ɜːr", "axr": "ər", "ey": "eɪ", "ay": "aɪ", "oy": "ɔɪ", "aw": "aʊ", "ow": "oʊ",
      "p": "p", "b": "b", "t": "t", "d": "d", "k": "k", "g": "g", "f": "f", "v": "v", "th": "θ", "dh": "ð",
      "s": "s", "z": "z", "sh": "ʃ", "zh": "ʒ", "ch": "tʃ", "jh": "dʒ", "m": "m", "n": "n", "ng": "ŋ", "l": "l", "r": "r", "w": "w", "y": "j", "hh": "h"
    };
    function getStandardIpa(pObj) {
      if (pObj.IPA) return pObj.IPA;
      const code = (pObj.Phoneme || "").toLowerCase();
      return ARPABET_TO_IPA[code] || code;
    }

    /* ===== State ===== */
    let recording = false;
    let audioContext = null;
    let recBuffer = [];
    let lastRecordedBlob = null;

    const recordBtn = document.getElementById("recordBtn");
    const playbackBtn = document.getElementById("playbackBtn");
    const testAzureBtn = document.getElementById("testAzureBtn");
    const statusLabel = document.getElementById("status");
    const barsContainer = document.getElementById("bars-container");
    const mainScoreEl = document.getElementById("main-score");
    const scoreHeader = document.getElementById("score-header");
    const starsEl = document.getElementById("stars");
    const tipBox = document.getElementById("tip-box");

    // ===== 常见辅音组合预设 =====
    const COMMON_CLUSTERS = [
      "th", "sh", "ch", "ph", "gh", "ck", "wh", "ng", "qu", "oo", "ea", "ai", "ou", "ee",
      "pp", "tt", "bb", "dd", "ff", "gg", "mm", "nn", "rr", "ss", "ll"
    ];

    /* ===== 增强型字母-音素对齐逻辑 (支持合并显示) ===== */
    function alignLettersToPhonemes(word, phonemes) {
      const letters = word.toLowerCase();
      const pCount = phonemes.length;
      let letterIndex = 0;

      // 预处理音素
      const phObjects = phonemes.map(p => ({
        ipa: getStandardIpa(p), // 使用强制转换
        score: p.PronunciationAssessment?.AccuracyScore || 0,
        raw: p
      }));

      const finalGroups = [];
      const isAppleStyle = letters.endsWith('le') && letters.length > 3;

      for (let i = 0; i < pCount; i++) {
        let curr = phObjects[i];
        let next = i + 1 < pCount ? phObjects[i + 1] : null;

        let groupPhonemes = [curr.raw];
        let groupDisplayIpa = curr.ipa;
        let groupTtsIpa = curr.ipa;
        let score = curr.score;

        // 0. 基础环境初始化
        const remainingLetters = letters.length - letterIndex;
        const curChar = letters[letterIndex] || "";
        const nextChar = letters[letterIndex + 1] || "";

        // 1. 特殊合并逻辑 (ə 不再合并，显式独立)
        const isX = curChar === 'x' && next && (next.ipa === 'z' || next.ipa === 's');

        if (isX) {
          groupPhonemes.push(next.raw);
          groupDisplayIpa += next.ipa;
          groupTtsIpa += " " + next.ipa;
          score = Math.min(score, next.score);
          i++; // 跳过 next 音素
        }

        // 2. 字母切割逻辑
        let chunkSize = 1;

        // 检查双写字母 (pp, tt, ll, ss...)
        if (curChar === nextChar && COMMON_CLUSTERS.includes(curChar + nextChar) && remainingLetters >= 2) {
          chunkSize = 2;
        }
        // 检查末尾 'le' (针对 Apple 等词)
        else if (isAppleStyle && remainingLetters <= 2 && i >= pCount - 2) {
          chunkSize = remainingLetters;
        }

        if (letterIndex + chunkSize > letters.length) chunkSize = letters.length - letterIndex;
        const chunkStr = word.substr(letterIndex, chunkSize);

        finalGroups.push({
          letters: chunkStr,
          displayPh: groupDisplayIpa,
          ttsIpa: groupTtsIpa,
          score: score
        });
        letterIndex += chunkSize;
      }
      return finalGroups;
    }

    /* ===== Render UI ===== */
    function renderResult(nbest) {
      scoreHeader.style.opacity = "1";
      const acc = Math.round(nbest.PronunciationAssessment.AccuracyScore || 0);
      mainScoreEl.innerHTML = `${acc}<span class="score-unit">分</span>`;

      const starCount = Math.round(acc / 20);
      let starHtml = "";
      for (let i = 0; i < 5; i++) starHtml += i < starCount ? "★" : "<span class='gray'>☆</span>";
      starsEl.innerHTML = starHtml;

      const targetPhonemes = [];
      const displayPhonemesList = [];
      nbest.Words.forEach(w => {
        if (w.Phonemes) {
          targetPhonemes.push(...w.Phonemes);
          w.Phonemes.forEach(p => displayPhonemesList.push(getStandardIpa(p)));
        }
      });

      if (!ipaEl || !ipaEl.innerText || ipaEl.innerText === "//") {
        ipaEl.innerText = `/${displayPhonemesList.join(' ')}/`;
      }

      const alignedData = alignLettersToPhonemes(targetWord, targetPhonemes);
      barsContainer.innerHTML = "";
      alignedData.forEach(group => {
        const div = document.createElement("div");
        div.className = "bar-group";
        div.onclick = () => playPhoneme(group.ttsIpa, group.displayPh);

        const score = Math.round(group.score);
        let colorClass = score >= 80 ? "bg-good" : (score >= 60 ? "bg-fair" : "bg-poor");

        div.innerHTML = `
          <div class="bar-letter">${group.letters}</div>
          <div class="bar-ipa">/${group.displayPh}/</div>
          <div class="bar-score ${colorClass}">${score}</div>
        `;
        barsContainer.appendChild(div);
      });
    }

    /* ===== TTS & Tips ===== */
    async function playPhoneme(ttsIpa, displayPhoneme) {
      const cleanKey = displayPhoneme.replace(/[()]/g, '').trim();
      let tip = PhonemeTips[cleanKey] || PhonemeTips[cleanKey.split(' ')[0]];
      if (tip) {
        tipBox.style.display = "block";
        tipBox.innerText = `/${displayPhoneme}/ : ${tip}`;
      }

      try {
        const ssml = `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="en-US">
          <voice name="en-US-ChristopherNeural">
            <phoneme alphabet="ipa" ph="${ttsIpa}"> ${targetWord} </phoneme>
          </voice>
        </speak>`;
        const res = await fetch(window.location.origin + "/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ssml })
        });
        if (res.ok) {
          const blob = await res.blob();
          const audio = new Audio(URL.createObjectURL(blob));
          audio.play();
        }
      } catch (e) { console.error("TTS Error", e); }
    }

    /* ===== Recording Logic (Modern & Resampled) ===== */
    recordBtn.onclick = async () => {
      if (!recording) {
        await startRecord();
      } else {
        stopRecord();
      }
    };

    async function startRecord() {
      logDebug("正在请求麦克风 (16kHz PCM 直接采样)...");
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        if (audioContext.state === 'suspended') await audioContext.resume();

        const input = audioContext.createMediaStreamSource(stream);
        // 4096 对于 16k 采样率约 250ms 一次回调
        const processor = audioContext.createScriptProcessor(4096, 1, 1);
        recBuffer = [];

        processor.onaudioprocess = e => {
          if (recording) {
            const channelData = e.inputBuffer.getChannelData(0);
            recBuffer.push(new Float32Array(channelData));
            logDebug(`[Live] 采集音频分片: ${channelData.length} samples`);
          }
        };

        input.connect(processor);
        processor.connect(audioContext.destination);

        recording = true;
        recordBtn.classList.add("recording");
        statusLabel.innerText = "正在录制...";
        logDebug("PCM 直接采集已启动", "ok");

        window.recStream = stream;
        window.recProcessor = processor;
        window.recInput = input;
      } catch (e) {
        logDebug(`初始化失败: ${e.message}`, "err");
        alert("无法启动录音: " + e.message);
      }
    }

    function stopRecord() {
      if (!recording) return;
      logDebug("停止采样，开始构建 WAV...");
      const startTime = Date.now();
      recording = false;
      recordBtn.classList.remove("recording");

      if (window.recProcessor) window.recProcessor.disconnect();
      if (window.recInput) window.recInput.disconnect();
      if (window.recStream) window.recStream.getTracks().forEach(t => t.stop());

      // 合并 PCM 数据并生成 WAV
      const totalLen = recBuffer.reduce((acc, b) => acc + b.length, 0);
      const flatBuffer = new Float32Array(totalLen);
      let offset = 0;
      for (const b of recBuffer) {
        flatBuffer.set(b, offset);
        offset += b.length;
      }

      const wavBlob = encodeWAVFromFloat(flatBuffer);
      lastRecordedBlob = wavBlob;
      playbackBtn.disabled = false;

      logDebug(`本地处理完成: ${Date.now() - startTime}ms`, "ok");
      logDebug(`音频包大小: ${wavBlob.size} bytes`, "ok");

      sendCheck(wavBlob);
      if (audioContext) audioContext.close();
    }

    function encodeWAVFromFloat(samples) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);
      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true); // PCM
      view.setUint16(22, 1, true); // Mono
      view.setUint32(24, 16000, true);
      view.setUint32(28, 32000, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, samples.length * 2, true);
      let offset = 44;
      for (let i = 0; i < samples.length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      return new Blob([buffer], { type: 'audio/wav' });
    }

    testAzureBtn.onclick = async () => {
      logDebug("正在测试云端连通性（发送 0.5s 静音）...");
      const silentBuffer = new Float32Array(8000); // 0.5s at 16k
      const blob = encodeWAVFromFloat(silentBuffer);
      sendCheck(blob);
    };

    playbackBtn.onclick = () => {
      if (lastRecordedBlob) {
        logDebug("请求录音回放...");
        const audio = new Audio(URL.createObjectURL(lastRecordedBlob));
        audio.play().catch(e => {
          logDebug(`回放失败: ${e.message}`, "err");
          alert("请先点击页面任意处以解除浏览器静音限制");
        });
      }
    };

    async function sendCheck(blob) {
      const startTime = Date.now();
      logDebug(`发起评分请求: /assess?text=${targetWord}`);
      try {
        const res = await fetch(`/assess?text=${targetWord}`, {
          method: "POST",
          body: blob
        });
        logDebug(`云端响应时间: ${Date.now() - startTime}ms`);
        logDebug(`后端响应码: ${res.status}`);
        const data = await res.json();

        if (data.NBest && data.NBest.length > 0) {
          logDebug("评分成功接收", "ok");
          statusLabel.innerText = "测评完成";
          renderResult(data.NBest[0]);
        } else {
          logDebug(`评分结果异常: ${data.RecognitionStatus}`, "err");
          statusLabel.innerText = "未识别到语音";
        }
      } catch (e) {
        logDebug(`上传失败: ${e.message}`, "err");
        statusLabel.innerText = "网络请求失败";
      }
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    logDebug("主逻辑已绑定，准备就绪", "ok");
  </script>
</body>

</html>
