<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anki Pronunciation</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.card {
  padding: 8px;
}
#word {
  text-align: center;
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 6px;
}
#status {
  text-align: center;
  font-size: 12px;
  color: #666;
  margin: 4px 0;
}
audio {
  width: 100%;
  margin-top: 6px;
  accent-color: #1976ff;
}
#scores {
  margin-top: 6px;
  font-size: 13px;
  line-height: 1.5;
}
</style>
</head>

<body>
<div class="card">
  <div id="word">Loading…</div>
  <div id="status">等待录音</div>
  <audio id="player" controls></audio>
  <div id="scores"></div>
</div>

<script>
/* ===== 单词来自 Anki ===== */
const params = new URLSearchParams(location.search);
const word = params.get("word") || "example";
document.getElementById("word").innerText = word;

/* ===== 接收 Anki 传来的音频 ===== */
window.addEventListener("message", async (event) => {
  if (!event.data || !event.data.audio) return;

  const audioBlob = base64ToBlob(event.data.audio, "audio/wav");

  const player = document.getElementById("player");
  const status = document.getElementById("status");
  const scoresDiv = document.getElementById("scores");

  player.src = URL.createObjectURL(audioBlob);
  scoresDiv.innerHTML = "";
  status.innerText = "测评中…";

  try {
    const res = await fetch(
      "/assess?text=" + encodeURIComponent(word),
      { method: "POST", body: audioBlob }
    );
    const data = await res.json();
    const pa = data?.NBest?.[0]?.PronunciationAssessment;
    if (!pa) throw "no score";

    const acc = pa.AccuracyScore ?? 0;
    const flu = pa.FluencyScore ?? 0;
    const comp = pa.CompletenessScore ?? 0;
    const total = Math.round((acc + flu + comp) / 3);

    status.innerText = "测评完成";
    scoresDiv.innerHTML = `
      总分：${total}<br>
      Accuracy：${Math.round(acc)}<br>
      Fluency：${Math.round(flu)}<br>
      Completeness：${Math.round(comp)}
    `;
  } catch {
    status.innerText = "测评失败";
  }
});

/* ===== Base64 → Blob ===== */
function base64ToBlob(base64, type) {
  const bin = atob(base64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type });
}
</script>
</body>
</html>
