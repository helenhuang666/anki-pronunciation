<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pronunciation Assessment</title>
  <style>
    /* ===== Global & Layout ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fff;
      height: 100vh;
      /* Fallback */
      height: 100dvh;
      /* Dynamic Viewport Height for Mobile */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      /* Scale global UI by 80% */
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
      /* Allow scrolling if content is tall */
    }

    /* ... omitted styles ... */

    /* ===== Buttons ===== */
    .playback-btn {
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #607d8b;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s;
    }

    .playback-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .playback-btn:active {
      opacity: 0.7;
    }

    /* ===== Target Word & IPA ===== */
    #target-word {
      font-size: 32px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      text-align: center;
      margin-top: 20px;
    }

    #target-ipa {
      font-size: 18px;
      color: #888;
      font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
      margin-bottom: 20px;
      min-height: 24px;
    }

    /* ===== Total Score & Stars ===== */
    .score-header {
      text-align: center;
      margin-bottom: auto;
      transition: opacity 0.3s;
    }

    .total-score {
      font-size: 64px;
      font-weight: 500;
      color: #0288d1;
      /* 加深后的蓝色 (Deep Light Blue) */
      line-height: 1;
    }

    .score-unit {
      font-size: 24px;
      margin-left: 4px;
    }

    .stars {
      font-size: 28px;
      color: #0288d1;
      /* 加深后的蓝色 */
      margin-top: 10px;
      letter-spacing: 4px;
    }

    .stars .gray {
      color: #e0e0e0;
    }

    /* ===== Phoneme Bars ===== */
    .bars-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      /* Slightly tighter gap */
      margin-bottom: 20px;
      flex-wrap: wrap;
      width: 100%;
    }

    .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 35px;
      /* Narrower by 30% (was 50px) */
      background-color: #e1f5fe;
      /* Very light blue background */
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      border-bottom-left-radius: 4px;
      border-bottom-right-radius: 4px;
      padding-top: 16px;
      position: relative;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .bar-group:active {
      transform: scale(0.95);
    }

    .bar-letter {
      font-size: 18px;
      color: #0277bd;
      /* Darker Blue text for letters */
      margin-bottom: 4px;
      font-weight: 500;
    }

    .bar-ipa {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
      font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
    }

    .bar-score {
      width: 100%;
      text-align: center;
      color: white;
      padding: 6px 0;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      margin-top: auto;
      /* Push to bottom */
    }

    /* Colors based on score (Semantics kept red/yellow/green for clarity) */
    .bg-good {
      background-color: #81c784;
    }

    /* Green */
    .bg-fair {
      background-color: #ffb74d;
    }

    /* Orange */
    .bg-poor {
      background-color: #e57373;
    }

    /* Red */

    /* ===== Bottom Controls ===== */
    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: white;
      padding-bottom: max(30px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .mic-button {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: #0288d1;
      /* 加深后的蓝色 */
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(2, 136, 209, 0.4);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-button svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .mic-button.recording {
      background-color: #ff5252;
      /* Red when recording */
      box-shadow: 0 0 0 6px rgba(255, 82, 82, 0.3);
      animation: pulse 1.5s infinite;
    }

    .status-text {
      margin-top: 12px;
      color: #333;
      font-size: 15px;
      font-weight: 500;
      min-height: 20px;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }
    }

    /* Debug Console */
    #debug-console {
      margin: 10px;
      padding: 10px;
      background: #333;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      border-radius: 6px;
      max-height: 120px;
      overflow-y: auto;
      display: block;
      /* 暂时开启以便诊断 */
      text-align: left;
      line-height: 1.4;
      border: 1px solid #555;
    }

    .debug-line {
      margin-bottom: 2px;
    }

    .debug-err {
      color: #ff5252;
    }

    .debug-ok {
      color: #4caf50;
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- Header Word & IPA -->
    <div id="target-word">Apple</div>
    <div id="target-ipa"></div>

    <!-- Score Header -->
    <div class="score-header" id="score-header" style="opacity: 0;">
      <div class="total-score" id="main-score">0<span class="score-unit">分</span></div>
      <div class="stars" id="stars">★★★★★</div>
    </div>

    <div id="tip-box"></div>

    <!-- Bars Area -->
    <div class="bars-container" id="bars-container">
      <div style="color:#666; font-size: 16px; margin: 20px; text-align: center; line-height: 1.6;">
        <div style="font-weight: 600; color: #0288d1; margin-bottom: 8px;">测评模式已就绪</div>
        点击下方蓝色麦克风开始录音<br>
        建议测试单词：<b>Apple</b>
      </div>
    </div>

    <!-- Debug Output -->
    <div id="debug-console">
      <div class="debug-line">[SYS] 等待启动...</div>
    </div>

  </div>

  <!-- Bottom Controls -->
  <div class="controls">
    <div style="display:flex; gap:10px; margin-bottom:10px;">
      <button id="testAzureBtn" class="playback-btn" style="background:#009688;">测试云端连接</button>
      <button id="playbackBtn" class="playback-btn" disabled>回放</button>
    </div>
    <button id="recordBtn" class="mic-button">
      <!-- Mic Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
        <path
          d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
      </svg>
    </button>
    <div class="status-text" id="status">点击录音</div>
  </div>

  <script type="module">
    // ===== Debug Logger (Must be TOP) =====
    const debugConsole = document.getElementById("debug-console");
    function logDebug(msg, type = "") {
      const line = document.createElement("div");
      line.className = "debug-line" + (type ? " debug-" + type : "");
      line.innerText = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
      if (debugConsole) {
        debugConsole.appendChild(line);
        debugConsole.scrollTop = debugConsole.scrollHeight;
      }
      console.log("[DEBUG]", msg);
    }

    logDebug("脚本初始化中...");

    let PhonemeTips = {};
    try {
      const module = await import("./phoneme_tips.js");
      PhonemeTips = module.PhonemeTips || {};
      logDebug("音标提示插件加载成功", "ok");
    } catch (e) {
      logDebug("音标提示插件加载失败，将使用精简模式", "err");
    }

    const params = new URLSearchParams(window.location.search);
    const targetWord = decodeURIComponent(params.get("word") || "Apple");
    const userIpa = decodeURIComponent(params.get("ipa") || "");

    // 立即显示单词
    const wordEl = document.getElementById("target-word");
    const ipaEl = document.getElementById("target-ipa");
    if (wordEl) wordEl.innerText = targetWord;
    if (ipaEl) ipaEl.innerText = userIpa ? `/${userIpa.replace(/^\/|\/$/g, '')}/` : "";

    /* ===== State ===== */
    let recording = false;
    let mediaRecorder = null;
    let audioBlobs = [];
    let lastRecordedBlob = null;

    const recordBtn = document.getElementById("recordBtn");
    const playbackBtn = document.getElementById("playbackBtn");
    const testAzureBtn = document.getElementById("testAzureBtn");
    const statusLabel = document.getElementById("status");
    const barsContainer = document.getElementById("bars-container");
    const mainScoreEl = document.getElementById("main-score");
    const scoreHeader = document.getElementById("score-header");
    const starsEl = document.getElementById("stars");
    const tipBox = document.getElementById("tip-box");

    // ===== 常见辅音组合预设 =====
    const COMMON_CLUSTERS = [
      "th", "sh", "ch", "ph", "gh", "ck", "wh", "ng", "qu", "oo", "ea", "ai", "ou", "ee",
      "pp", "tt", "bb", "dd", "ff", "gg", "mm", "nn", "rr", "ss", "ll"
    ];

    /* ===== 增强型字母-音素对齐逻辑 (支持合并显示) ===== */
    function alignLettersToPhonemes(word, phonemes) {
      const letters = word.toLowerCase();
      const pCount = phonemes.length;
      let letterIndex = 0;

      // 预处理音素
      const phObjects = phonemes.map(p => ({
        ipa: p.IPA || p.Phoneme, // 核心：使用 Azure 返回的 IPA
        score: p.PronunciationAssessment?.AccuracyScore || 0,
        raw: p
      }));

      const finalGroups = [];

      for (let i = 0; i < pCount; i++) {
        let curr = phObjects[i];
        let next = i + 1 < pCount ? phObjects[i + 1] : null;

        let groupPhonemes = [curr.raw];
        let groupDisplayIpa = curr.ipa;
        let groupTtsIpa = curr.ipa;
        let score = curr.score;

        // 1. 弱读合并逻辑 (ə)
        if (curr.ipa === "ə" && next) {
          groupPhonemes.push(next.raw);
          groupDisplayIpa = `(${curr.ipa})${next.ipa}`;
          groupTtsIpa = `${curr.ipa} ${next.ipa}`;
          score = (curr.score + next.score) / 2;
          i++; // 跳过 next
          curr = phObjects[i]; // 更新当前引用
          next = i + 1 < pCount ? phObjects[i + 1] : null;
        }

        // 2. 字母切割逻辑
        const remainingLetters = letters.length - letterIndex;
        const curChar = letters[letterIndex] || "";
        const tailPh = groupPhonemes[groupPhonemes.length - 1].Phoneme.toLowerCase();
        let chunkSize = 1;

        // 检查 'x' 规则 (针对 group 尾部音素 + peek)
        const peekIndex = i + 1;
        const peekPh = peekIndex < pCount ? phObjects[peekIndex] : null;

        if (curChar === 'x' && peekPh) {
          const p1 = tailPh;
          const p2 = peekPh.raw.Phoneme.toLowerCase();
          // Azure 即使在 IPA 模式下，Phoneme 字段可能还是保留原始代码或对应音素
          if ((p1 === 'g' || p1 === 'k') && (p2 === 'z' || p2 === 's')) {
            groupPhonemes.push(peekPh.raw);
            groupDisplayIpa += peekPh.ipa;
            groupTtsIpa += " " + peekPh.ipa;
            score = Math.min(score, peekPh.score);
            i++;
            chunkSize = 1;
          }
        }
        else if (groupDisplayIpa.includes('l') && letters.endsWith('le') && i >= pCount - 1 && remainingLetters >= 2) {
          chunkSize = remainingLetters;
        }
        else if (COMMON_CLUSTERS.includes(letters.substr(letterIndex, 2)) && remainingLetters > 2) {
          chunkSize = 2;
        }

        if (letterIndex + chunkSize > letters.length) chunkSize = letters.length - letterIndex;
        const chunkStr = word.substr(letterIndex, chunkSize);

        finalGroups.push({
          letters: chunkStr,
          displayPh: groupDisplayIpa,
          ttsIpa: groupTtsIpa,
          score: score
        });
        letterIndex += chunkSize;
      }
      return finalGroups;
    }

    /* ===== Render UI ===== */
    function renderResult(nbest) {
      scoreHeader.style.opacity = "1";
      const acc = Math.round(nbest.PronunciationAssessment.AccuracyScore || 0);
      mainScoreEl.innerHTML = `${acc}<span class="score-unit">分</span>`;

      const starCount = Math.round(acc / 20);
      let starHtml = "";
      for (let i = 0; i < 5; i++) starHtml += i < starCount ? "★" : "<span class='gray'>☆</span>";
      starsEl.innerHTML = starHtml;

      const targetPhonemes = [];
      const displayPhonemesList = [];
      nbest.Words.forEach(w => {
        if (w.Phonemes) {
          targetPhonemes.push(...w.Phonemes);
          w.Phonemes.forEach(p => displayPhonemesList.push(p.IPA || p.Phoneme));
        }
      });

      if (!ipaEl || !ipaEl.innerText || ipaEl.innerText === "//") {
        ipaEl.innerText = `/${displayPhonemesList.join(' ')}/`;
      }

      const alignedData = alignLettersToPhonemes(targetWord, targetPhonemes);
      barsContainer.innerHTML = "";
      alignedData.forEach(group => {
        const div = document.createElement("div");
        div.className = "bar-group";
        div.onclick = () => playPhoneme(group.ttsIpa, group.displayPh);

        const score = Math.round(group.score);
        let colorClass = score >= 80 ? "bg-good" : (score >= 60 ? "bg-fair" : "bg-poor");

        div.innerHTML = `
          <div class="bar-letter">${group.letters}</div>
          <div class="bar-ipa">/${group.displayPh}/</div>
          <div class="bar-score ${colorClass}">${score}</div>
        `;
        barsContainer.appendChild(div);
      });
    }

    /* ===== TTS & Tips ===== */
    async function playPhoneme(ttsIpa, displayPhoneme) {
      const cleanKey = displayPhoneme.replace(/[()]/g, '').trim();
      let tip = PhonemeTips[cleanKey] || PhonemeTips[cleanKey.split(' ')[0]];
      if (tip) {
        tipBox.style.display = "block";
        tipBox.innerText = `/${displayPhoneme}/ : ${tip}`;
      }

      try {
        const ssml = `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="en-US">
          <voice name="en-US-ChristopherNeural">
            <phoneme alphabet="ipa" ph="${ttsIpa}"> ${targetWord} </phoneme>
          </voice>
        </speak>`;
        const res = await fetch(window.location.origin + "/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ssml })
        });
        if (res.ok) {
          const blob = await res.blob();
          const audio = new Audio(URL.createObjectURL(blob));
          audio.play();
        }
      } catch (e) { console.error("TTS Error", e); }
    }

    /* ===== Recording Logic (Modern & Resampled) ===== */
    recordBtn.onclick = async () => {
      if (!recording) {
        await startRecord();
      } else {
        stopRecord();
      }
    };

    async function startRecord() {
      logDebug("正在请求麦克风权限...");
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        logDebug("麦克风权限已获准", "ok");

        // 我们不指定 MIME 类型，让浏览器自由选择最稳定的 (webm/ogg)
        mediaRecorder = new MediaRecorder(stream);
        audioBlobs = [];

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioBlobs.push(event.data);
            logDebug(`接收到音频分片: ${event.data.size} bytes`);
          }
        };

        mediaRecorder.onstop = async () => {
          logDebug("录音已停止，开始封装 Blob...");
          const blob = new Blob(audioBlobs, { type: mediaRecorder.mimeType });
          logDebug(`封装完成: ${blob.size} bytes, 类型: ${blob.type}`, "ok");

          // 1. 保存用于回放的原声 (确保回放绝对有声)
          lastRecordedBlob = blob;
          playbackBtn.disabled = false;
          playbackBtn.innerText = "回放";

          // 2. 强力转码：AudioContext 解码 -> 重采样 -> WAV
          try {
            statusLabel.innerText = "正在转码及评分...";
            logDebug("开始 16kHz 重采样转码...");
            const wavBlob = await convertToAzureWav(blob);
            logDebug(`转码成功: ${wavBlob.size} bytes PCM WAV`, "ok");
            sendCheck(wavBlob);
          } catch (err) {
            logDebug(`转码失败: ${err.message}`, "err");
            statusLabel.innerText = "音频转码错误";
          }
        };

        mediaRecorder.start(500); // 间隔500ms触发一次 dataavailable
        logDebug("MediaRecorder 已启动");
        recording = true;
        recordBtn.classList.add("recording");
        statusLabel.innerText = "正在录制...";

        window.recStream = stream;
      } catch (e) {
        logDebug(`麦克风启动失败: ${e.name} - ${e.message}`, "err");
        alert("麦克风启动失败，请确保已授予权限或处于 HTTPS 环境。");
      }
    }

    function stopRecord() {
      if (!recording || !mediaRecorder) return;
      logDebug("停止录音...");
      recording = false;
      recordBtn.classList.remove("recording");

      mediaRecorder.stop();
      if (window.recStream) {
        window.recStream.getTracks().forEach(t => t.stop());
      }
    }

    // 核心工具：将任意浏览器音频 Blob 转为符合 Azure 要求的 16k Mono PCM WAV
    async function convertToAzureWav(blob) {
      const buffer = await blob.arrayBuffer();
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // 兼容 iOS 异步解码
      const audioData = await new Promise((resolve, reject) => {
        ctx.decodeAudioData(buffer, resolve, (err) => {
          logDebug(`音频解码错误: ${err ? err.message : '未知'}`, "err");
          reject(err || new Error("Decode failed"));
        });
      });

      // 创建 16000Hz 的离线上下文进行重采样
      const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
      const offlineCtx = new OfflineCtx(1, Math.ceil(audioData.duration * 16000), 16000);

      const source = offlineCtx.createBufferSource();
      source.buffer = audioData;
      source.connect(offlineCtx.destination);
      source.start();

      // 兼容旧版 startRendering 回调格式
      const resampledData = await new Promise((resolve) => {
        offlineCtx.oncomplete = (e) => resolve(e.renderedBuffer);
        const promise = offlineCtx.startRendering();
        if (promise && promise.then) promise.then(resolve);
      });

      const pcmBlob = encodeWAVFromFloat(resampledData.getChannelData(0));
      await ctx.close();
      return pcmBlob;
    }

    function encodeWAVFromFloat(samples) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);
      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true); // PCM
      view.setUint16(22, 1, true); // Mono
      view.setUint32(24, 16000, true);
      view.setUint32(28, 32000, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, samples.length * 2, true);
      let offset = 44;
      for (let i = 0; i < samples.length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      return new Blob([buffer], { type: 'audio/wav' });
    }

    testAzureBtn.onclick = async () => {
      logDebug("正在测试云端连通性（发送 0.5s 静音）...");
      const silentBuffer = new Float32Array(8000); // 0.5s at 16k
      const blob = encodeWAVFromFloat(silentBuffer);
      sendCheck(blob);
    };

    playbackBtn.onclick = () => {
      if (lastRecordedBlob) {
        logDebug("请求录音回放...");
        const audio = new Audio(URL.createObjectURL(lastRecordedBlob));
        audio.play().catch(e => {
          logDebug(`回放失败: ${e.message}`, "err");
          alert("请先点击页面任意处以解除浏览器静音限制");
        });
      }
    };

    async function sendCheck(blob) {
      logDebug(`发起评分请求: /assess?text=${targetWord}`);
      try {
        const res = await fetch(`/assess?text=${targetWord}`, {
          method: "POST",
          body: blob
        });
        logDebug(`后端响应码: ${res.status}`);
        const data = await res.json();

        if (data.NBest && data.NBest.length > 0) {
          logDebug("评分成功接收", "ok");
          statusLabel.innerText = "测评完成";
          renderResult(data.NBest[0]);
        } else {
          logDebug(`评分结果异常: ${data.RecognitionStatus}`, "err");
          statusLabel.innerText = "未识别到语音";
        }
      } catch (e) {
        logDebug(`上传失败: ${e.message}`, "err");
        statusLabel.innerText = "网络请求失败";
      }
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    logDebug("主逻辑已绑定，准备就绪", "ok");
  </script>
</body>

</html>
