<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pronunciation Assessment</title>
  <style>
    /* ===== Global & Layout ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fff;
      height: 100vh;
      /* Fallback */
      height: 100dvh;
      /* Dynamic Viewport Height for Mobile */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
      /* Allow scrolling if content is tall */
    }

    /* ===== Target Word & IPA ===== */
    #target-word {
      font-size: 32px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      text-align: center;
    }

    #target-ipa {
      font-size: 18px;
      color: #888;
      font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
      margin-bottom: 20px;
      min-height: 24px;
    }

    /* ===== Total Score & Stars ===== */
    .score-header {
      text-align: center;
      margin-bottom: 40px;
      transition: opacity 0.3s;
    }

    .total-score {
      font-size: 64px;
      font-weight: 500;
      color: #4fc3f7;
      /* Light Blue Theme */
      line-height: 1;
    }

    .score-unit {
      font-size: 24px;
      margin-left: 4px;
    }

    .stars {
      font-size: 28px;
      color: #4fc3f7;
      /* Light Blue Theme */
      margin-top: 10px;
      letter-spacing: 4px;
    }

    .stars .gray {
      color: #e0e0e0;
    }

    /* ===== Phoneme Bars ===== */
    .bars-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      /* Slightly tighter gap */
      margin-bottom: 20px;
      flex-wrap: wrap;
      width: 100%;
    }

    .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 35px;
      /* Narrower by 30% (was 50px) */
      background-color: #e1f5fe;
      /* Very light blue background */
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      border-bottom-left-radius: 4px;
      border-bottom-right-radius: 4px;
      padding-top: 16px;
      position: relative;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .bar-group:active {
      transform: scale(0.95);
    }

    .bar-letter {
      font-size: 18px;
      color: #0277bd;
      /* Darker Blue text for letters */
      margin-bottom: 4px;
      font-weight: 500;
    }

    .bar-ipa {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
      font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
    }

    .bar-score {
      width: 100%;
      text-align: center;
      color: white;
      padding: 6px 0;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      margin-top: auto;
      /* Push to bottom */
    }

    /* Colors based on score (Semantics kept red/yellow/green for clarity) */
    .bg-good {
      background-color: #81c784;
    }

    /* Green */
    .bg-fair {
      background-color: #ffb74d;
    }

    /* Orange */
    .bg-poor {
      background-color: #e57373;
    }

    /* Red */

    /* ===== Bottom Controls ===== */
    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: white;
      padding-bottom: max(30px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .mic-button {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: #4fc3f7;
      /* Light Blue Theme */
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(79, 195, 247, 0.4);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-button svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .mic-button.recording {
      background-color: #ff5252;
      /* Red when recording */
      box-shadow: 0 0 0 6px rgba(255, 82, 82, 0.3);
      animation: pulse 1.5s infinite;
    }

    .status-text {
      margin-top: 12px;
      color: #333;
      font-size: 15px;
      font-weight: 500;
      min-height: 20px;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }
    }

    /* Tip Box */
    #tip-box {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      font-size: 14px;
      color: #333;
      z-index: 100;
      display: none;
      border: 1px solid #eee;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <div id="tip-box"></div>

    <!-- Target Word Display -->
    <div id="target-word"></div>
    <!-- IPA Display -->
    <div id="target-ipa"></div>

    <!-- Score Header -->
    <div class="score-header" id="score-header" style="opacity: 0;">
      <div class="total-score" id="main-score">0<span class="score-unit">分</span></div>
      <div class="stars" id="stars">★★★★★</div>
    </div>

    <!-- Bars Area -->
    <div class="bars-container" id="bars-container">
      <div style="color:#aaa; font-size: 16px; margin-top:20px;">点击下方麦克风开始测评</div>
    </div>

  </div>

  <!-- Bottom Controls -->
  <div class="controls">
    <button id="recordBtn" class="mic-button">
      <!-- Mic Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
        <path
          d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
      </svg>
    </button>
    <div class="status-text" id="status">点击录音</div>
  </div>

  <script type="module">
    import { PhonemeTips } from "./phoneme_tips.js";

    // ===== 音标转换映射 (USPhonetic -> 美式 IPA) =====
    const US_PHONETIC_TO_IPA = {
      "aa": "ɑ", "ae": "æ", "ah": "ʌ", "ao": "ɔ", "aw": "aʊ", "ax": "ə", "ay": "aɪ",
      "eh": "e", "er": "ɝ", "ey": "eɪ", "ih": "ɪ", "iy": "i", "ow": "oʊ", "oy": "ɔɪ",
      "uh": "ʊ", "uw": "u", "ch": "tʃ", "dh": "ð", "jh": "dʒ", "ng": "ŋ", "sh": "ʃ",
      "th": "θ", "zh": "ʒ", "y": "j", "d": "d", "f": "f", "g": "g", "h": "h",
      "k": "k", "l": "l", "m": "m", "n": "n", "p": "p", "r": "r", "s": "s",
      "t": "t", "v": "v", "w": "w", "z": "z"
    };

    function convertUsToIpa(ph) {
      // 处理可能带重音符号的音丝（Azure 有时会带数字）
      const cleanPh = ph.toLowerCase().replace(/[0-9]/g, '');
      return US_PHONETIC_TO_IPA[cleanPh] || ph;
    }

    const params = new URLSearchParams(window.location.search);
    const targetWord = decodeURIComponent(params.get("word") || "Example");
    const userIpa = decodeURIComponent(params.get("ipa") || ""); // 明确处理空值

    // 立即显示单词
    document.getElementById("target-word").innerText = targetWord;
    const targetIpaEl = document.getElementById("target-ipa");
    if (userIpa) {
      // 统一格式显示：/ih g z ae m p ax l/
      targetIpaEl.innerText = `/${userIpa.trim().replace(/^\/|\/$/g, '')}/`;
    } else {
      targetIpaEl.innerText = "";
    }

    /* ===== State ===== */
    let recording = false;
    let audioContext = null;
    let chunks = [];

    const recordBtn = document.getElementById("recordBtn");
    const statusLabel = document.getElementById("status");
    const barsContainer = document.getElementById("bars-container");
    const mainScoreEl = document.getElementById("main-score");
    const scoreHeader = document.getElementById("score-header");
    const starsEl = document.getElementById("stars");
    const tipBox = document.getElementById("tip-box");

    // ===== 常见辅音组合预设 (解决切割不准问题) =====
    const COMMON_CLUSTERS = [
      "th", "sh", "ch", "ph", "gh", "ck", "wh", "ng", "qu", "oo", "ea", "ai", "ou", "ee"
    ];

    /* ===== Heuristic Alignment Logic ===== */
    function alignLettersToPhonemes(word, phonemes) {
      const letters = word.toLowerCase();
      const aligned = [];
      let letterIndex = 0;
      const pCount = phonemes.length;

      let userPhonemes = null;
      if (userIpa) {
        const clean = userIpa.trim().replace(/^\/|\/$/g, '');
        const parts = clean.split(/\s+/).filter(Boolean);
        userPhonemes = parts;
      }

      phonemes.forEach((ph, i) => {
        let displayPh = convertUsToIpa(ph.Phoneme);
        if (userPhonemes && userPhonemes[i]) {
          displayPh = userPhonemes[i];
        }

        // 2. 增强型字母对齐
        const remainingPhonemes = pCount - i;
        const remainingLetters = letters.length - letterIndex;
        let chunkSize = 1;

        if (remainingPhonemes === 1) {
          // 最后一个音素拿走剩下所有字母
          chunkSize = remainingLetters;
        } else {
          // 如果当前的音素对应到辅音，且后面跟着常见辅音组合，尝试合并
          const nextTwo = letters.substr(letterIndex, 2);
          if (COMMON_CLUSTERS.includes(nextTwo) && remainingLetters > 2) {
            chunkSize = 2;
          } else {
            // 默认分配权重
            chunkSize = Math.ceil(remainingLetters / remainingPhonemes);
          }
        }

        // 越界检查
        if (letterIndex + chunkSize > letters.length) {
          chunkSize = letters.length - letterIndex;
        }

        const chunk = word.substr(letterIndex, chunkSize);

        aligned.push({
          phoneme: displayPh,
          azurePhoneme: ph.Phoneme,
          score: ph.PronunciationAssessment?.AccuracyScore || 0,
          letters: chunk
        });

        letterIndex += chunkSize;
      });

      return aligned;
    }

    /* ===== Render UI ===== */
    function renderResult(nbest) {
      scoreHeader.style.opacity = "1";
      const pa = nbest.PronunciationAssessment;
      const acc = Math.round(pa.AccuracyScore || 0);
      mainScoreEl.innerHTML = `${acc}<span class="score-unit">分</span>`;

      const starCount = Math.round(acc / 20);
      let starHtml = "";
      for (let i = 0; i < 5; i++) starHtml += i < starCount ? "★" : "<span class='gray'>☆</span>";
      starsEl.innerHTML = starHtml;

      const targetPhonemes = [];
      const displayPhonemesList = [];
      nbest.Words.forEach(w => {
        if (w.Phonemes) {
          targetPhonemes.push(...w.Phonemes);
          w.Phonemes.forEach(p => displayPhonemesList.push(convertUsToIpa(p.Phoneme)));
        }
      });

      if (!targetIpaEl.innerText || targetIpaEl.innerText === "//") {
        targetIpaEl.innerText = `/${displayPhonemesList.join(' ')}/`;
      }

      const alignedData = alignLettersToPhonemes(targetWord, targetPhonemes);
      barsContainer.innerHTML = "";
      alignedData.forEach(item => {
        const score = item.score;
        let colorClass = "bg-poor";
        if (score >= 80) colorClass = "bg-good";
        else if (score >= 60) colorClass = "bg-fair";

        const div = document.createElement("div");
        div.className = "bar-group";
        div.onclick = () => playPhoneme(item.azurePhoneme, item.phoneme);

        const lDiv = document.createElement("div");
        lDiv.className = "bar-letter";
        lDiv.innerText = item.letters;

        const iDiv = document.createElement("div");
        iDiv.className = "bar-ipa";
        iDiv.innerText = `/${item.phoneme.replace(/\//g, '')}/`;

        const sDiv = document.createElement("div");
        sDiv.className = `bar-score ${colorClass}`;
        sDiv.innerText = Math.round(score);

        div.appendChild(lDiv);
        div.appendChild(iDiv);
        div.appendChild(sDiv);
        barsContainer.appendChild(div);
      });
    }

    // Play Phoneme
    async function playPhoneme(ttsPhoneme, displayPhoneme) {
      const tip = PhonemeTips[displayPhoneme] || PhonemeTips[convertUsToIpa(ttsPhoneme)] || PhonemeTips[ttsPhoneme];
      if (tip) {
        showTip(displayPhoneme, tip);
      }

      try {
        const ssml = `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="en-US">
      <voice name="en-US-AvaMultilingualNeural">
        <phoneme alphabet="ipa" ph="${ttsPhoneme}"> ${ttsPhoneme} </phoneme>
      </voice>
    </speak>`;

        // 强制使用绝对路径确保请求到达后端
        const apiUrl = window.location.origin + "/tts";

        const res = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ssml })
        }).catch(netErr => {
          console.error("Fetch Error:", netErr);
          alert("网络请求被拦截，请检查是否处于 Anki 离线环境或防火墙设置。");
          throw netErr;
        });

        if (res.ok) {
          const blob = await res.blob();
          const audioUrl = URL.createObjectURL(blob);
          const audio = new Audio();
          audio.src = audioUrl;

          audio.load();
          audio.play().catch(e => {
            console.warn("Autoplay blocked:", e);
            statusLabel.innerText = "点击竖条试听";
          });
        } else {
          const err = await res.json().catch(() => ({}));
          console.error("TTS Backend Failed:", res.status, err);
          alert(`发音失败 (HTTP ${res.status}): ${err.reason || "请检查云端密钥配置"}`);
        }
      } catch (e) {
        console.error("TTS Final Error:", e);
      }
    }

    function showTip(ph, text) {
      tipBox.style.display = "block";
      tipBox.innerText = `/${ph}/ : ${text}`;
      setTimeout(() => { tipBox.style.display = "none"; }, 3000);
    }

    /* ===== Recording Logic ===== */
    recordBtn.onclick = async () => {
      if (!recording) {
        await startRecord();
      } else {
        stopRecord();
      }
    };

    async function startRecord() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        // Resume context for iOS
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        const input = audioContext.createMediaStreamSource(stream);
        const processor = audioContext.createScriptProcessor(4096, 1, 1);

        chunks = [];
        processor.onaudioprocess = e => {
          chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
        };

        input.connect(processor);
        processor.connect(audioContext.destination);

        recording = true;
        recordBtn.classList.add("recording");
        statusLabel.innerText = "点击停止";

        window.recStream = stream;
        window.recProcessor = processor;
        window.recInput = input;

      } catch (e) {
        console.error(e);
        alert("无法访问麦克风: " + e.message);
      }
    }

    function stopRecord() {
      if (!recording) return;
      recording = false;
      recordBtn.classList.remove("recording");
      statusLabel.innerText = "正在评分...";

      if (window.recProcessor) window.recProcessor.disconnect();
      if (window.recInput) window.recInput.disconnect();
      if (window.recStream) window.recStream.getTracks().forEach(t => t.stop());

      // Safe stop
      if (audioContext) {
        // Allow last chunk to process
        setTimeout(() => {
          const wav = encodeWAV(chunks);
          sendCheck(wav);
          audioContext.close();
        }, 200);
      }
    }

    /* ===== Utilities ===== */
    function encodeWAV(buffers) {
      let len = buffers.reduce((s, b) => s + b.length, 0);
      let pcm = new Int16Array(len);
      let offset = 0;
      buffers.forEach(b => {
        for (let i = 0; i < b.length; i++, offset++) {
          let s = Math.max(-1, Math.min(1, b[i]));
          pcm[offset] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
      });

      const wav = new ArrayBuffer(44 + pcm.length * 2);
      const view = new DataView(wav);

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + pcm.length * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, 16000, true);
      view.setUint32(28, 32000, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, pcm.length * 2, true);

      let p = 44;
      for (let i = 0; i < pcm.length; i++) {
        view.setInt16(p, pcm[i], true);
        p += 2;
      }

      return new Blob([view], { type: 'audio/wav' });
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    async function sendCheck(blob) {
      try {
        const res = await fetch(`/assess?text=${targetWord}`, {
          method: "POST",
          body: blob
        });

        const data = await res.json();

        if (data.NBest && data.NBest.length > 0) {
          statusLabel.innerText = "评分完成";
          renderResult(data.NBest[0]);
        } else {
          const status = data.RecognitionStatus || "Fail";
          statusLabel.innerText = "未识别: " + status;
          if (status === 'NoMatch') {
            alert("未检测到有效语音，请重试");
          }
        }
      } catch (e) {
        statusLabel.innerText = "网络/服务错误";
        console.error(e);
      }
    }
  </script>
</body>

</html>
