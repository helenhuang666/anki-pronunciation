<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Pronunciation Assessment</title>
  <style>
    /* ===== Global & Layout ===== */
    body {
      margin: 0;
      padding: 0;
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #fff;
      height: 100vh;
      /* Fallback */
      height: 100dvh;
      /* Dynamic Viewport Height for Mobile */
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      /* Scale global UI by 80% */
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
      /* Allow scrolling if content is tall */
    }

    /* ... omitted styles ... */

    /* ===== Buttons ===== */
    .playback-btn {
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #607d8b;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.2s;
    }

    .playback-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    .playback-btn:active {
      opacity: 0.7;
    }

    /* ===== Target Word & IPA ===== */
    #target-word {
      font-size: 32px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      text-align: center;
      margin-top: 20px;
    }

    #target-ipa {
      font-size: 18px;
      color: #888;
      font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
      margin-bottom: 20px;
      min-height: 24px;
    }

    /* ===== Total Score & Stars ===== */
    .score-header {
      text-align: center;
      margin-bottom: auto;
      transition: opacity 0.3s;
    }

    .total-score {
      font-size: 64px;
      font-weight: 500;
      color: #0288d1;
      /* 加深后的蓝色 (Deep Light Blue) */
      line-height: 1;
    }

    .score-unit {
      font-size: 24px;
      margin-left: 4px;
    }

    .stars {
      font-size: 28px;
      color: #0288d1;
      /* 加深后的蓝色 */
      margin-top: 10px;
      letter-spacing: 4px;
    }

    .stars .gray {
      color: #e0e0e0;
    }

    /* ===== Phoneme Bars ===== */
    .bars-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      /* Slightly tighter gap */
      margin-bottom: 20px;
      flex-wrap: wrap;
      width: 100%;
    }

    .bar-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 35px;
      /* Narrower by 30% (was 50px) */
      background-color: #e1f5fe;
      /* Very light blue background */
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      border-bottom-left-radius: 4px;
      border-bottom-right-radius: 4px;
      padding-top: 16px;
      position: relative;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .bar-group:active {
      transform: scale(0.95);
    }

    .bar-letter {
      font-size: 18px;
      color: #0277bd;
      /* Darker Blue text for letters */
      margin-bottom: 4px;
      font-weight: 500;
    }

    .bar-ipa {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
      font-family: "Lucida Sans Unicode", "Arial Unicode MS", sans-serif;
    }

    .bar-score {
      width: 100%;
      text-align: center;
      color: white;
      padding: 6px 0;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      margin-top: auto;
      /* Push to bottom */
    }

    /* Colors based on score (Semantics kept red/yellow/green for clarity) */
    .bg-good {
      background-color: #81c784;
    }

    /* Green */
    .bg-fair {
      background-color: #ffb74d;
    }

    /* Orange */
    .bg-poor {
      background-color: #e57373;
    }

    /* Red */

    /* ===== Bottom Controls ===== */
    .controls {
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: white;
      padding-bottom: max(30px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .mic-button {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: #0288d1;
      /* 加深后的蓝色 */
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(2, 136, 209, 0.4);
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .mic-button svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .mic-button.recording {
      background-color: #ff5252;
      /* Red when recording */
      box-shadow: 0 0 0 6px rgba(255, 82, 82, 0.3);
      animation: pulse 1.5s infinite;
    }

    .status-text {
      margin-top: 12px;
      color: #333;
      font-size: 15px;
      font-weight: 500;
      min-height: 20px;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }

      100% {
        transform: scale(1);
      }
    }

    /* Tip Box */
    #tip-box {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      font-size: 14px;
      color: #333;
      z-index: 100;
      display: none;
      border: 1px solid #eee;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Score Header -->
    <div class="score-header" id="score-header" style="opacity: 0;">
      <div class="total-score" id="main-score">0<span class="score-unit">分</span></div>
      <div class="stars" id="stars">★★★★★</div>
    </div>

    <div id="tip-box"></div>

    <!-- Bars Area -->
    <div class="bars-container" id="bars-container">
      <div style="color:#aaa; font-size: 16px; margin-top:20px;">点击下方麦克风开始测评</div>
    </div>

  </div>

  <!-- Bottom Controls -->
  <div class="controls">
    <button id="recordBtn" class="mic-button">
      <!-- Mic Icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
        <path
          d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
      </svg>
    </button>
    <div class="status-text" id="status">点击录音</div>
    <button id="playbackBtn" class="playback-btn" disabled>回放我的发音</button>
  </div>

  <script type="module">
    import { PhonemeTips } from "./phoneme_tips.js";

    // ===== 音标转换映射 (USPhonetic -> 美式 IPA) =====
    const US_PHONETIC_TO_IPA = {
      "aa": "ɑ", "ae": "æ", "ah": "ʌ", "ao": "ɔ", "aw": "aʊ", "ax": "ə", "ay": "aɪ",
      "eh": "e", "er": "ɝ", "ey": "eɪ", "ih": "ɪ", "iy": "i", "ow": "oʊ", "oy": "ɔɪ",
      "uh": "ʊ", "uw": "u", "ch": "tʃ", "dh": "ð", "jh": "dʒ", "ng": "ŋ", "sh": "ʃ",
      "th": "θ", "zh": "ʒ", "y": "j", "d": "d", "f": "f", "g": "g", "h": "h",
      "k": "k", "l": "l", "m": "m", "n": "n", "p": "p", "r": "r", "s": "s",
      "t": "t", "v": "v", "w": "w", "z": "z"
    };

    function convertUsToIpa(ph) {
      // 处理可能带重音符号的音丝（Azure 有时会带数字）
      const cleanPh = ph.toLowerCase().replace(/[0-9]/g, '');
      return US_PHONETIC_TO_IPA[cleanPh] || ph;
    }

    const params = new URLSearchParams(window.location.search);
    const targetWord = decodeURIComponent(params.get("word") || "Example");
    const userIpa = decodeURIComponent(params.get("ipa") || ""); // 明确处理空值

    // 立即显示单词
    document.getElementById("target-word").innerText = targetWord;
    const targetIpaEl = document.getElementById("target-ipa");
    if (userIpa) {
      // 统一格式显示：/ih g z ae m p ax l/
      targetIpaEl.innerText = `/${userIpa.trim().replace(/^\/|\/$/g, '')}/`;
    } else {
      targetIpaEl.innerText = "";
    }

    /* ===== State ===== */
    let recording = false;
    let audioContext = null;
    let chunks = [];

    const recordBtn = document.getElementById("recordBtn");
    const statusLabel = document.getElementById("status");
    const barsContainer = document.getElementById("bars-container");
    const mainScoreEl = document.getElementById("main-score");
    const scoreHeader = document.getElementById("score-header");
    const starsEl = document.getElementById("stars");
    const tipBox = document.getElementById("tip-box");

    // ===== 常见辅音组合预设 (解决切割不准问题) =====
    const COMMON_CLUSTERS = [
      "th", "sh", "ch", "ph", "gh", "ck", "wh", "ng", "qu", "oo", "ea", "ai", "ou", "ee",
      // 双辅音
      "pp", "tt", "bb", "dd", "ff", "gg", "mm", "nn", "rr", "ss", "ll"
    ];


    /* ===== 增强型字母-音素对齐逻辑 (支持单字母多音素合并 & 弱读合并) ===== */
    function alignLettersToPhonemes(word, phonemes) {
      const letters = word.toLowerCase();
      const alignedGroups = [];
      let letterIndex = 0;
      const pCount = phonemes.length;

      // 转换所有音素为小写，并预计算 IPA 供后续使用
      const phObjects = phonemes.map(p => ({
        raw: p.Phoneme.toLowerCase(),
        ipa: convertUsToIpa(p.Phoneme),
        score: p.PronunciationAssessment?.AccuracyScore || 0,
        original: p
      }));

      const finalGroups = [];

      for (let i = 0; i < pCount; i++) {
        let curr = phObjects[i];
        let next = i + 1 < pCount ? phObjects[i + 1] : null;

        let groupPhonemes = [curr.original];
        let groupDisplayIpa = curr.ipa;
        let groupTtsIpa = curr.ipa;
        let score = curr.score;

        // 1. 弱读合并检测：当前是 ə (ax)，且有下一个
        if (curr.ipa === "ə" && next) {
          // 合并 next 进来
          groupPhonemes.push(next.original);
          groupDisplayIpa = `(${curr.ipa})${next.ipa}`;
          groupTtsIpa = `${curr.ipa} ${next.ipa}`;
          score = (curr.score + next.score) / 2; // 取平均分

          // 步进，因为 next 已经被消费
          i++;
          // 更新 curr/next 指针给后续逻辑判断 (比如 le 判断)
          // 注意：现在的“主导”音素变成了 next
          curr = next; // curr现在代表了组合的第二个音素
          next = i + 1 < pCount ? phObjects[i + 1] : null; // 重新获取下一个
        }

        // 2. 字母切割
        const remainingLetters = letters.length - letterIndex;
        const curChar = letters[letterIndex] || ''; // 当前字母，可能为空

        // 检查 x 规则 (针对 group 中的最后一个音素和 再下一个音素)
        // 现在的 group 可能包含 [ə, next] 或者 [curr]。
        // 我们看 group 的最后一个音素 tailPh
        const tailPh = groupPhonemes[groupPhonemes.length - 1];
        const tailPhRaw = tailPh.Phoneme.toLowerCase();

        // 检查是否有下一个待处理音素 (peek)
        const peekIndex = i + 1;
        const peekPh = peekIndex < pCount ? phObjects[peekIndex] : null;

        let chunkSize = 1;

        if (curChar === 'x' && peekPh) {
          const p1 = tailPhRaw;
          const p2 = peekPh.raw;
          if ((p1 === 'g' && p2 === 'z') || (p1 === 'k' && p2 === 's')) {
            // X 规则触发：当前的 group (可能也就是 g/k) 和 peek (z/s) 被 x 吃掉
            groupPhonemes.push(peekPh.original);
            groupDisplayIpa = groupDisplayIpa + peekPh.ipa; // 这里不再加括号，直接连起来
            groupTtsIpa = groupTtsIpa + " " + peekPh.ipa;
            score = Math.min(score, peekPh.score); // 取最低分
            chunkSize = 1; // x 只占 1 个字母
            i++; // 消费 peek
          }
        }
        // le 规则 (通常是 ax l 或 l)
        // 如果我们的 group 已经是 (ə)l，且结尾是 le
        else if (groupDisplayIpa.includes('l') && letters.endsWith('le') && i >= pCount - 1 && remainingLetters >= 2) {
          chunkSize = remainingLetters;
        }
        // 常见组合规则
        else if (COMMON_CLUSTERS.includes(letters.substr(letterIndex, 2)) && remainingLetters > 2) {
          chunkSize = 2;
        }
        // 默认权重：平分
        else {
          // 简单策略：remainingLetters / (pCount - i)
          // 但 pCount - i 是剩余的原始音素数，不对。
          // 我们用最简单的 1 吧，反正大部分是一对一。
          chunkSize = 1;
        }

        if (letterIndex + chunkSize > letters.length) chunkSize = letters.length - letterIndex;

        const chunkStr = word.substr(letterIndex, chunkSize);

        finalGroups.push({
          letters: chunkStr,
          displayPh: groupDisplayIpa,
          ttsIpa: groupTtsIpa,
          score: score,
          rawPhonemes: groupPhonemes
        });

        letterIndex += chunkSize;
      }

      return finalGroups;
    }

    /* ===== Render UI ===== */
    function renderResult(nbest) {
      scoreHeader.style.opacity = "1";
      const acc = Math.round(nbest.PronunciationAssessment.AccuracyScore || 0);
      mainScoreEl.innerHTML = `${acc}<span class="score-unit">分</span>`;

      const starCount = Math.round(acc / 20);
      let starHtml = "";
      for (let i = 0; i < 5; i++) starHtml += i < starCount ? "★" : "<span class='gray'>☆</span>";
      starsEl.innerHTML = starHtml;

      const targetPhonemes = [];
      const displayPhonemesList = [];
      nbest.Words.forEach(w => {
        if (w.Phonemes) {
          targetPhonemes.push(...w.Phonemes);
          w.Phonemes.forEach(p => displayPhonemesList.push(convertUsToIpa(p.Phoneme)));
        }
      });

      if (!targetIpaEl.innerText || targetIpaEl.innerText === "//") {
        targetIpaEl.innerText = `/${displayPhonemesList.join(' ')}/`;
      }

      const alignedData = alignLettersToPhonemes(targetWord, targetPhonemes);
      barsContainer.innerHTML = "";
      alignedData.forEach(group => {
        const score = group.score;
        let colorClass = "bg-poor";
        // 宽松一点评分颜色
        if (score >= 80) colorClass = "bg-good";
        else if (score >= 60) colorClass = "bg-fair";

        // 如果是弱读合并的，可能想给个特殊样式？暂时不用。

        const div = document.createElement("div");
        div.className = "bar-group";
        // 如果包含多个音素，播放组合音
        div.onclick = () => playPhoneme(group.ttsIpa, group.displayPh);

        const lDiv = document.createElement("div");
        lDiv.className = "bar-letter";
        lDiv.innerText = group.letters;

        const iDiv = document.createElement("div");
        iDiv.className = "bar-ipa";
        // 移除IPA中的括号用于纯净显示？不，用户要求带括号
        iDiv.innerText = `/${group.displayPh}/`;

        const sDiv = document.createElement("div");
        sDiv.className = `bar-score ${colorClass}`;
        sDiv.innerText = Math.round(score);

        div.appendChild(lDiv);
        div.appendChild(iDiv);
        div.appendChild(sDiv);
        barsContainer.appendChild(div);
      });

      // 启用回放按钮
      if (lastRecordedBlob) {
        playbackBtn.disabled = false;
        playbackBtn.innerText = "回放我的发音";
      }
    }

    // Play Phoneme
    async function playPhoneme(ttsIpa, displayPhoneme) {
      // 提示处理 (简化：取第一个字符做key?? 不，尽量匹配)
      // 删除括号再匹配提示
      const cleanKey = displayPhoneme.replace(/[()]/g, '').trim();
      // 如果是组合音，尝试拆分找提示 (只显示第一个提示？)
      // 简单处理：如果找不到组合的提示，就找第一个音素的
      let tip = PhonemeTips[cleanKey] || PhonemeTips[cleanKey.split(' ')[0]];

      if (tip) {
        showTip(displayPhoneme, tip);
      }

      try {
        // 使用 Christopher 且使用 IPA
        const ssml = `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xml:lang="en-US">
      <voice name="en-US-ChristopherNeural">
        <phoneme alphabet="ipa" ph="${ttsIpa}"> ${targetWord} </phoneme>
      </voice>
    </speak>`;

        // 强制使用绝对路径确保请求到达后端
        const apiUrl = window.location.origin + "/tts";

        const res = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ssml
          })
        }).catch(netErr => {
          console.error("Fetch Error:", netErr);
          alert("网络请求被拦截，请检查是否处于 Anki 离线环境或防火墙设置。");
          throw netErr;
        });

        if (res.ok) {
          const blob = await res.blob();
          const audioUrl = URL.createObjectURL(blob);
          const audio = new Audio();
          audio.src = audioUrl;

          audio.load();
          audio.play().catch(e => {
            console.warn("Autoplay blocked:", e);
            statusLabel.innerText = "点击竖条试听";
          });
        } else {
          const err = await res.json().catch(() => ({}));
          console.error("TTS Backend Failed:", res.status, err);
          alert(`发音失败 (HTTP ${res.status}): ${err.reason || "请检查云端密钥配置"}`);
        }
      } catch (e) {
        console.error("TTS Final Error:", e);
      }
    }

    function showTip(ph, text) {
      tipBox.style.display = "block";
      tipBox.innerText = `/${ph}/ : ${text}`;
    }

    /* ===== Recording Logic ===== */
    recordBtn.onclick = async () => {
      if (!recording) {
        await startRecord();
      } else {
        stopRecord();
      }
    };

    async function startRecord() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        // Resume context for iOS
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        const input = audioContext.createMediaStreamSource(stream);
        const processor = audioContext.createScriptProcessor(4096, 1, 1);

        chunks = [];
        processor.onaudioprocess = e => {
          chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
        };

        input.connect(processor);
        processor.connect(audioContext.destination);

        recording = true;
        recordBtn.classList.add("recording");
        statusLabel.innerText = "点击停止";

        window.recStream = stream;
        window.recProcessor = processor;
        window.recInput = input;

      } catch (e) {
        console.error(e);
        alert("无法访问麦克风: " + e.message);
      }
    }

    function stopRecord() {
      if (!recording) return;
      recording = false;
      recordBtn.classList.remove("recording");
      statusLabel.innerText = "正在评分...";

      if (window.recProcessor) window.recProcessor.disconnect();
      if (window.recInput) window.recInput.disconnect();
      if (window.recStream) window.recStream.getTracks().forEach(t => t.stop());

      // Safe stop
      if (audioContext) {
        // Allow last chunk to process
        setTimeout(() => {
          const wav = encodeWAV(chunks);
          lastRecordedBlob = wav; // 保存 blob

          // 立即启用回放 (不管评分是否成功)
          playbackBtn.disabled = false;
          playbackBtn.innerText = "回放我的发音";

          sendCheck(wav);
          audioContext.close();
        }, 200);
      }
    }

    /* ===== Utilities ===== */
    function encodeWAV(buffers) {
      let len = buffers.reduce((s, b) => s + b.length, 0);
      let pcm = new Int16Array(len);
      let offset = 0;
      buffers.forEach(b => {
        for (let i = 0; i < b.length; i++, offset++) {
          let s = Math.max(-1, Math.min(1, b[i]));
          pcm[offset] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
      });

      const wav = new ArrayBuffer(44 + pcm.length * 2);
      const view = new DataView(wav);

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + pcm.length * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, 16000, true);
      view.setUint32(28, 32000, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, pcm.length * 2, true);

      let p = 44;
      for (let i = 0; i < pcm.length; i++) {
        view.setInt16(p, pcm[i], true);
        p += 2;
      }

      return new Blob([view], { type: 'audio/wav' });
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    async function sendCheck(blob) {
      try {
        const res = await fetch(`/assess?text=${targetWord}`, {
          method: "POST",
          body: blob
        });

        const data = await res.json();

        if (data.NBest && data.NBest.length > 0) {
          statusLabel.innerText = "评分完成";
          renderResult(data.NBest[0]);
        } else {
          const status = data.RecognitionStatus || "Fail";
          statusLabel.innerText = "未识别: " + status;
          if (status === 'NoMatch') {
            alert("未检测到有效语音，请重试");
          }
        }
      } catch (e) {
        statusLabel.innerText = "网络/服务错误";
        console.error(e);
      }
    }
  </script>
